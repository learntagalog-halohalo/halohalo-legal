<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>メール確認完了 — HaloHalo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #EAF6E6 0%, #ffffff 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #222;
    }
    .card {
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.08);
      max-width: 420px;
      width: 100%;
      padding: 40px 28px 32px;
      text-align: center;
    }
    .check {
      width: 76px; height: 76px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: #78C85A;
      display: flex; align-items: center; justify-content: center;
      font-size: 42px; color: #fff;
      box-shadow: 0 6px 16px rgba(120,200,90,0.4);
    }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 12px; }
    p { font-size: 14px; line-height: 1.7; color: #666; }
    .btn {
      display: inline-block;
      margin-top: 26px;
      background: #78C85A;
      color: #fff;
      font-size: 16px; font-weight: 700;
      text-decoration: none;
      padding: 14px 34px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(120,200,90,0.35);
    }
    .foot { margin-top: 22px; font-size: 11px; color: #BBB; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>メール確認が完了しました</h1>
    <p>アカウントの登録が完了しました。<br />HaloHalo アプリに戻ってログインしてください。</p>
    <a class="btn" href="halohalo://">アプリを開く</a>
    <div class="foot">© 2026 HaloHalo · Learn Tagalog</div>
  </div>
</body>
</html>
